<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>長崎市 3Dエリアマップ | あいぜん不動産</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    :root {
      --green:   #4A6741;
      --teal:    #1B6E6C;
      --orange:  #E65100;
      --white:   #ffffff;
      --ink:     #1c2b1c;
      --mist:    #f4f6f3;
      --border:  #e4e9e3;
      --shadow:  0 4px 28px rgba(0,0,0,.20), 0 0 0 1px rgba(0,0,0,.06);
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
      background: #0d1a0d;
      overflow: hidden;
    }

    /* ═══════════════════════════════════ MAP ══ */
    #map {
      position: fixed; inset: 0;
    }

    /* ══════════════════════════════════ LOADING ══ */
    #loading-overlay {
      position: fixed; inset: 0;
      background: #0d1a0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      z-index: 999;
      transition: opacity .7s ease;
    }

    .ld-icon {
      position: relative; width: 48px; height: 48px;
    }

    .ld-ring {
      position: absolute; inset: 0;
      border: 2px solid rgba(255,255,255,.08);
      border-top-color: #4A6741;
      border-right-color: #1B6E6C;
      border-radius: 50%;
      animation: spin 1.4s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ld-dot {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .ld-dot::after {
      content: '';
      width: 6px; height: 6px;
      background: #1B6E6C;
      border-radius: 50%;
    }

    .ld-text {
      color: rgba(255,255,255,.7);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: .1em;
    }

    .ld-sub {
      color: rgba(255,255,255,.3);
      font-size: 11px;
      letter-spacing: .06em;
    }

    /* ════════════════════════════════════ PANEL ══ */
    #panel {
      position: fixed;
      top: 16px; left: 16px;
      width: 292px;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 10;
      font-size: 14px;
    }

    /* ─ Header ─ */
    .panel-head {
      background: var(--green);
      padding: 14px 16px 13px;
      position: relative;
      overflow: hidden;
    }

    .panel-head::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg,
        rgba(255,255,255,.07) 0%,
        transparent 60%);
    }

    .ph-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
      margin-bottom: 3px;
    }

    .ph-title {
      font-size: 15px;
      font-weight: 700;
      color: white;
      letter-spacing: -.01em;
      line-height: 1.2;
    }

    .ph-sub {
      font-size: 11px;
      font-weight: 300;
      color: rgba(255,255,255,.65);
      margin-top: 2px;
    }

    /* ─ Search ─ */
    .panel-search {
      padding: 12px 12px 10px;
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%);
      color: #bbb; pointer-events: none;
      transition: color .2s;
    }

    #town-input:focus ~ .search-hint,
    .search-wrap:focus-within .search-icon {
      color: var(--teal);
    }

    #town-input {
      width: 100%;
      padding: 9px 36px 9px 34px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--ink);
      outline: none;
      background: white;
      transition: border-color .2s, box-shadow .2s;
    }

    #town-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(27,110,108,.10);
    }

    #town-input::placeholder {
      color: #c0c8bf;
      font-size: 13px;
    }

    .clear-btn {
      display: none;
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: #bbb; cursor: pointer; padding: 2px;
      transition: color .15s;
    }

    .clear-btn:hover { color: #888; }
    .clear-btn.visible { display: flex; }

    /* ─ Results ─ */
    #results-wrap {
      max-height: 240px;
      overflow-y: auto;
      overscroll-behavior: contain;
      border-top: 1px solid var(--border);
    }

    #results-wrap::-webkit-scrollbar { width: 3px; }
    #results-wrap::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 2px;
    }

    .results-meta {
      padding: 6px 14px 5px;
      font-size: 10.5px;
      color: #aaa;
      background: var(--mist);
      font-weight: 400;
      letter-spacing: .03em;
    }

    .result-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      transition: background .13s, color .13s, padding-left .13s;
      border-bottom: 1px solid rgba(0,0,0,.04);
    }

    .result-item::before {
      content: '';
      width: 4px; height: 4px;
      background: var(--teal);
      border-radius: 50%;
      opacity: 0;
      flex-shrink: 0;
      transition: opacity .15s;
    }

    .result-item:hover {
      background: #f0f8f7;
      color: var(--teal);
      padding-left: 18px;
    }

    .result-item:hover::before { opacity: 1; }

    .result-empty {
      padding: 16px 14px;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }

    /* ─ Selected card ─ */
    #selected-card {
      display: none;
      padding: 12px 16px 14px;
      background: linear-gradient(160deg, #e8f5f4 0%, #f2f9f8 100%);
      border-top: 2px solid var(--teal);
    }

    .sc-label {
      font-size: 9.5px;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 4px;
    }

    .sc-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.02em;
      line-height: 1.2;
    }

    .sc-hint {
      font-size: 11px;
      color: #999;
      margin-top: 5px;
      font-weight: 300;
    }

    .sc-close {
      float: right;
      background: none; border: none;
      color: #bbb; cursor: pointer; font-size: 16px;
      margin-top: -2px;
      transition: color .15s;
    }

    .sc-close:hover { color: #888; }

    /* ════════════════════════════════════ RESET BTN ══ */
    #reset-btn {
      position: fixed;
      bottom: 48px; right: 16px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      font-family: inherit;
      font-weight: 400;
      color: #666;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
      z-index: 10;
      transition: all .2s;
      display: flex; align-items: center; gap: 6px;
    }

    #reset-btn:hover {
      background: white;
      color: var(--green);
      border-color: var(--green);
    }

    /* ════════════════════════════════════ TOOLTIP ══ */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(28,43,28,.9);
      color: white;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 7px;
      white-space: nowrap;
      z-index: 20;
      opacity: 0;
      transition: opacity .15s;
      font-family: inherit;
    }

    /* ════════════════════════════════════ MAPLIBRE OVERRIDES ══ */
    .maplibregl-ctrl-top-right {
      top: 16px; right: 16px;
    }

    .maplibregl-ctrl-group {
      border-radius: 10px !important;
      box-shadow: var(--shadow) !important;
    }

    .maplibregl-ctrl-group button {
      width: 30px !important; height: 30px !important;
    }

    .maplibregl-ctrl-scale {
      background: rgba(255,255,255,.85) !important;
      border-radius: 4px !important;
      font-size: 10px !important;
    }

    /* ════════════════════════════════ TERRAIN NOTE ══ */
    #terrain-note {
      position: fixed;
      bottom: 48px; left: 16px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 10px;
      color: #888;
      z-index: 10;
      pointer-events: none;
      line-height: 1.5;
    }

    /* ════════════════════════════════ QUICK AREAS ══ */
    .quick-areas {
      padding: 0 12px 10px;
      border-top: 1px solid var(--border);
    }

    .quick-label {
      font-size: 10px;
      color: #aaa;
      letter-spacing: .06em;
      padding: 7px 0 5px;
    }

    .quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .quick-btn {
      padding: 4px 10px;
      background: var(--mist);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11.5px;
      color: #666;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
      white-space: nowrap;
    }

    .quick-btn:hover {
      background: #e8f4f3;
      color: var(--teal);
      border-color: var(--teal);
    }

    /* モバイル折りたたみ用 */
    #panel.mob-collapsed .panel-search,
    #panel.mob-collapsed #results-wrap,
    #panel.mob-collapsed .quick-areas,
    #panel.mob-collapsed #selected-card {
      display: none !important;
    }

    #mob-toggle {
      display: none;
      position: absolute;
      top: 14px; right: 12px;
      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      color: rgba(255,255,255,.9);
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }

    #mob-selected-badge {
      display: none;
      padding: 3px 14px 7px;
      font-size: 12px;
      color: rgba(255,255,255,.8);
    }

    #mob-selected-badge span {
      background: rgba(255,255,255,.18);
      border-radius: 12px;
      padding: 2px 10px;
      font-weight: 500;
    }

    /* ═══════════════════════════════ MOBILE ══ */
    @media (max-width: 640px) {
      #mob-toggle { display: block; }

      #mob-selected-badge { display: block; }

      #panel {
        top: auto; bottom: 0;
        left: 0; right: 0;
        width: 100%;
        border-radius: 16px 16px 0 0;
        max-height: 70vh;
        transition: max-height .3s ease;
      }

      #panel.mob-collapsed {
        max-height: 64px;
      }

      .panel-head { padding-right: 60px; }

      #results-wrap { max-height: 160px; }

      .maplibregl-ctrl-top-right {
        top: 16px; right: 16px;
      }

      #terrain-note { display: none; }

      #reset-btn {
        bottom: auto; top: 16px;
        left: 16px; right: auto;
      }
    }

    @media (min-width: 641px) and (max-width: 900px) {
      #panel { width: 268px; }
    }
  </style>
</head>
<body>

<!-- ══ Loading Overlay ══════════════════════════════ -->
<div id="loading-overlay">
  <div class="ld-icon">
    <div class="ld-ring"></div>
    <div class="ld-dot"></div>
  </div>
  <div class="ld-text">長崎の3D地形を準備しています</div>
  <div class="ld-sub">MapLibre GL JS + 国土地理院 標高タイル</div>
</div>

<!-- ══ Map ════════════════════════════════════════ -->
<div id="map"></div>

<!-- ══ Tooltip ══════════════════════════════════ -->
<div id="tooltip"></div>

<!-- ══ Search Panel ════════════════════════════ -->
<div id="panel">
  <div class="panel-head">
    <button id="mob-toggle" onclick="toggleMobPanel()">▲ 開く</button>
    <div class="ph-label">あいぜん不動産</div>
    <div class="ph-title">長崎市 3Dエリアマップ</div>
    <div class="ph-sub">地形から選ぶ移住先</div>
    <div id="mob-selected-badge"></div>
  </div>

  <div class="panel-search">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="town-input" type="text"
             placeholder="例：坂本二丁目"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="clear-btn" id="clear-btn" aria-label="クリア">
        <svg width="12" height="12" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="results-wrap"></div>

  <div id="selected-card">
    <button class="sc-close" id="sc-close-btn" aria-label="閉じる">×</button>
    <div class="sc-label">選択中のエリア</div>
    <div class="sc-name" id="sc-name"></div>
    <div class="sc-hint">3D地形上でハイライト表示中 — ドラッグで視点変更可</div>
  </div>

  <div class="quick-areas">
    <div class="quick-label">エリアから探す</div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="selectTown('立山一丁目')">立山</button>
      <button class="quick-btn" onclick="selectTown('浜平一丁目')">浜平</button>
      <button class="quick-btn" onclick="selectTown('坂本二丁目')">坂本</button>
      <button class="quick-btn" onclick="selectTown('鳴滝一丁目')">鳴滝</button>
      <button class="quick-btn" onclick="selectTown('大浦町')">大浦</button>
      <button class="quick-btn" onclick="selectTown('岩見町')">岩見町</button>
      <button class="quick-btn" onclick="selectTown('戸町一丁目')">戸町</button>
      <button class="quick-btn" onclick="selectTown('福田本町')">福田</button>
    </div>
  </div>
</div>

<!-- ══ Reset Button ════════════════════════════ -->
<button id="reset-btn" onclick="resetView()">
  <svg width="12" height="12" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
    <path d="M3 3v5h5"/>
  </svg>
  全体を表示
</button>

<!-- ══ Terrain Note ════════════════════════════ -->
<div id="terrain-note">
  ※ 標高は視認性のため1.5倍に誇張して表示しています
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// 設定値
// ══════════════════════════════════════════════════════════════
const CONFIG = {
  GEOJSON_URL:   'https://aizen2024.com/wp-content/uploads/2025/10/nagasaki_chome.geojson',
  CENTER:        [129.877, 32.748],   // 長崎市中心部
  ZOOM:          11.3,
  PITCH:         54,
  BEARING:       18,
  FLY_ZOOM:      14.8,
  FLY_PITCH:     58,
  EXAGGERATION:  1.5,                 // 地形誇張倍率（スパイク対策で抑え目に設定）
  HIGHLIGHT_COLOR:  '#1B6E6C',        // ティール
  HIGHLIGHT_BORDER: '#E65100',        // オレンジ
  BORDER_ALL_COLOR: '#4A6741',        // 深緑
};

// ══════════════════════════════════════════════════════════════
// マップ初期化
// ══════════════════════════════════════════════════════════════
const map = new maplibregl.Map({
  container: 'map',
  style: buildMapStyle(),
  center:   CONFIG.CENTER,
  zoom:     CONFIG.ZOOM,
  pitch:    CONFIG.PITCH,
  bearing:  CONFIG.BEARING,
  maxPitch: 80,
  minZoom:  7,
  antialias: true,
});

map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');
map.addControl(new maplibregl.ScaleControl({ maxWidth: 80, unit: 'metric' }), 'bottom-right');

function buildMapStyle() {
  // terrain と sky は load イベント後に追加する（初期スタイルに含めると
  // タイル取得完了まで load が発火しない場合があるため）
  return {
    version: 8,
    sources: {
      'gsi-std': {
        type: 'raster',
        tiles: ['https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png'],
        tileSize: 256,
        maxzoom: 18,
        attribution: '© <a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank" rel="noopener">国土地理院</a>'
      }
    },
    layers: [
      {
        id:     'gsi-raster',
        type:   'raster',
        source: 'gsi-std',
        paint:  { 'raster-opacity': 1.0 }
      }
    ]
  };
}

// ══════════════════════════════════════════════════════════════
// データ読み込み & レイヤー追加
// ══════════════════════════════════════════════════════════════
let geojsonData  = null;
let allTownNames = [];

// ── タイムアウト保険：10秒経っても load が来なければ強制解除
const loadingTimeout = setTimeout(() => {
  console.warn('[3DMap] load イベントタイムアウト。強制的にローディングを解除します。');
  hideLoading();
}, 10000);

map.on('error', e => {
  console.error('[3DMap] マップエラー:', e.error);
});

map.on('load', async () => {
  clearTimeout(loadingTimeout);

  // ① まず地図を表示してローディング解除
  hideLoading();

  // ② 地形（3D）ソースを load 後に追加（MapTiler terrain-rgb）
  try {
    map.addSource('terrain-src', {
      type: 'raster-dem',
      tiles: ['https://api.maptiler.com/tiles/terrain-rgb/{z}/{x}/{y}.png?key=z1gaCOD83iJlNE7swkZk'],
      tileSize: 512,
      maxzoom: 12,
      encoding: 'mapbox'
    });
    map.setTerrain({ source: 'terrain-src', exaggeration: CONFIG.EXAGGERATION });
  } catch (terrainErr) {
    console.warn('[3DMap] 地形ソース追加エラー（地図は表示継続）:', terrainErr);
  }

  // ③ GeoJSON 読み込み
  try {
    const res = await fetch(CONFIG.GEOJSON_URL, { mode: 'cors' });
    if (!res.ok) throw new Error(`HTTPステータス ${res.status}`);
    geojsonData = await res.json();

    // 町名一覧（重複除去・五十音ソート）
    allTownNames = [...new Set(
      geojsonData.features
        .map(f => f.properties?.S_NAME)
        .filter(Boolean)
    )].sort((a, b) => a.localeCompare(b, 'ja'));

    addLayers();
    initSearch();
    initHover();

  } catch (err) {
    console.error('[3DMap] GeoJSON読み込みエラー:', err);
    showCorsError(err.message);
  }
});

function addLayers() {
  // ── ソース
  map.addSource('towns', {
    type:       'geojson',
    data:        geojsonData,
    // generateId は feature-state を使う場合に必要。今回は setFilter 方式のため不要
  });

  // ── 全体境界線（薄い）
  map.addLayer({
    id:     'towns-outline',
    type:   'line',
    source: 'towns',
    paint:  {
      'line-color':   CONFIG.BORDER_ALL_COLOR,
      'line-width':   0.6,
      'line-opacity': 0.3
    }
  });

  // ── ハイライト：塗り（初期は条件 false で非表示）
  map.addLayer({
    id:     'towns-hl-fill',
    type:   'fill',
    source: 'towns',
    filter: ['==', 'S_NAME', '__NONE__'],
    paint:  {
      'fill-color':   CONFIG.HIGHLIGHT_COLOR,
      'fill-opacity': 0.5
    }
  });

  // ── ハイライト：境界線
  map.addLayer({
    id:     'towns-hl-line',
    type:   'line',
    source: 'towns',
    filter: ['==', 'S_NAME', '__NONE__'],
    paint:  {
      'line-color':   CONFIG.HIGHLIGHT_BORDER,
      'line-width':   2.5,
      'line-opacity': 0.95
    }
  });

  // ── ホバー：塗り
  map.addLayer({
    id:     'towns-hover-fill',
    type:   'fill',
    source: 'towns',
    filter: ['==', 'S_NAME', '__NONE__'],
    paint:  {
      'fill-color':   CONFIG.TEAL,
      'fill-opacity': 0.18
    }
  });
}

// ══════════════════════════════════════════════════════════════
// ホバー表示
// ══════════════════════════════════════════════════════════════
let hoveredTown = null;
const tooltip   = document.getElementById('tooltip');

function initHover() {
  map.on('mousemove', 'towns-outline', e => {
    if (!e.features.length) return;
    const name = e.features[0].properties.S_NAME;
    if (name === hoveredTown) return;
    hoveredTown = name;

    // ホバーハイライト更新
    map.setFilter('towns-hover-fill', ['==', 'S_NAME', name]);

    // ツールチップ
    tooltip.textContent = name;
    tooltip.style.opacity = '1';
    map.getCanvas().style.cursor = 'pointer';
  });

  map.on('mouseleave', 'towns-outline', () => {
    hoveredTown = null;
    map.setFilter('towns-hover-fill', ['==', 'S_NAME', '__NONE__']);
    tooltip.style.opacity = '0';
    map.getCanvas().style.cursor = '';
  });

  document.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top  = (e.clientY - 8) + 'px';
  });

  // 地図クリックで町名選択
  map.on('click', 'towns-outline', e => {
    if (!e.features.length) return;
    const name = e.features[0].properties.S_NAME;
    selectTown(name);
  });
}

// ══════════════════════════════════════════════════════════════
// 検索機能
// ══════════════════════════════════════════════════════════════
function initSearch() {
  // モバイルはデフォルト折りたたみ
  if (window.innerWidth <= 640) {
    collapseMobPanel();
  }

  const input      = document.getElementById('town-input');
  const clearBtn   = document.getElementById('clear-btn');
  const resultsDiv = document.getElementById('results-wrap');

  // 入力
  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    renderResults(q);
  });

  // Enter: 最初の候補を選択
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const first = resultsDiv.querySelector('.result-item');
      if (first) first.click();
    }
    if (e.key === 'Escape') clearSearch();
  });

  // クリアボタン
  clearBtn.addEventListener('click', clearSearch);

  // 選択カード閉じるボタン
  document.getElementById('sc-close-btn').addEventListener('click', clearSelection);
}

function renderResults(query) {
  const wrap = document.getElementById('results-wrap');
  wrap.innerHTML = '';

  if (!query) return;

  const matched = allTownNames.filter(n => n.includes(query));

  if (matched.length === 0) {
    wrap.innerHTML = '<div class="result-empty">該当する町名がありません</div>';
    return;
  }

  // 件数表示
  const meta = document.createElement('div');
  meta.className = 'results-meta';
  meta.textContent = `${matched.length} 件一致`;
  wrap.appendChild(meta);

  // 最大30件
  matched.slice(0, 30).forEach(name => {
    const el = document.createElement('div');
    el.className = 'result-item';
    el.textContent = name;
    el.addEventListener('click', () => selectTown(name));
    wrap.appendChild(el);
  });
}

// ══════════════════════════════════════════════════════════════
// 町名選択・ハイライト・カメラ移動
// ══════════════════════════════════════════════════════════════
function selectTown(name) {
  // UI 更新
  document.getElementById('town-input').value = name;
  document.getElementById('clear-btn').classList.add('visible');
  document.getElementById('results-wrap').innerHTML = '';
  document.getElementById('sc-name').textContent = name;
  document.getElementById('selected-card').style.display = 'block';

  // モバイル：選択後にパネルを折りたたむ
  if (window.innerWidth <= 640) {
    const badge = document.getElementById('mob-selected-badge');
    badge.innerHTML = '<span>' + name + '</span>';
    collapseMobPanel();
  }

  // レイヤーフィルター更新
  map.setFilter('towns-hl-fill', ['==', 'S_NAME', name]);
  map.setFilter('towns-hl-line', ['==', 'S_NAME', name]);

  // カメラをエリアの重心へ
  const features = geojsonData.features.filter(f => f.properties.S_NAME === name);
  if (!features.length) return;

  const centroid = calcCentroid(features);
  map.flyTo({
    center:   centroid,
    zoom:     CONFIG.FLY_ZOOM,
    pitch:    CONFIG.FLY_PITCH,
    bearing:  CONFIG.BEARING,
    duration: 1500,
    essential: true
  });
}

function clearSearch() {
  document.getElementById('town-input').value = '';
  document.getElementById('clear-btn').classList.remove('visible');
  document.getElementById('results-wrap').innerHTML = '';
}

function clearSelection() {
  clearSearch();
  document.getElementById('selected-card').style.display = 'none';
  map.setFilter('towns-hl-fill', ['==', 'S_NAME', '__NONE__']);
  map.setFilter('towns-hl-line', ['==', 'S_NAME', '__NONE__']);
}

// ══════════════════════════════════════════════════════════════
// モバイルパネル 折りたたみ
// ══════════════════════════════════════════════════════════════
function toggleMobPanel() {
  const panel = document.getElementById('panel');
  const btn   = document.getElementById('mob-toggle');
  if (panel.classList.contains('mob-collapsed')) {
    panel.classList.remove('mob-collapsed');
    btn.textContent = '▼ 閉じる';
  } else {
    collapseMobPanel();
  }
}

function collapseMobPanel() {
  const panel = document.getElementById('panel');
  const btn   = document.getElementById('mob-toggle');
  panel.classList.add('mob-collapsed');
  const name = document.getElementById('sc-name').textContent;
  btn.textContent = name ? '▲ ' + name : '▲ 開く';
}

function resetView() {
  clearSelection();
  // モバイルバッジもクリア
  const badge = document.getElementById('mob-selected-badge');
  if (badge) badge.innerHTML = '';
  const btn = document.getElementById('mob-toggle');
  if (btn) btn.textContent = '▲ 開く';
  const panel = document.getElementById('panel');
  if (panel && window.innerWidth <= 640) panel.classList.remove('mob-collapsed');
  map.flyTo({
    center:   CONFIG.CENTER,
    zoom:     CONFIG.ZOOM,
    pitch:    CONFIG.PITCH,
    bearing:  CONFIG.BEARING,
    duration: 1200,
    essential: true
  });
}

// ══════════════════════════════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════════════════════════════
function calcCentroid(features) {
  let lngSum = 0, latSum = 0, count = 0;
  features.forEach(f => {
    flattenCoords(f.geometry).forEach(([lng, lat]) => {
      lngSum += lng; latSum += lat; count++;
    });
  });
  return count ? [lngSum / count, latSum / count] : CONFIG.CENTER;
}

function flattenCoords(geometry) {
  const result = [];
  (function walk(c) {
    if (typeof c[0] === 'number') result.push(c);
    else c.forEach(walk);
  })(geometry.coordinates);
  return result;
}

function hideLoading() {
  const el = document.getElementById('loading-overlay');
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 750);
}

function showCorsError(msg) {
  const el = document.getElementById('loading-overlay');
  if (!el) return;
  el.style.opacity = '1';
  el.innerHTML = `
    <div style="color:#ff7c7c;font-size:14px;text-align:center;max-width:280px;line-height:1.6">
      <div style="font-size:18px;margin-bottom:12px">⚠</div>
      <strong>GeoJSONの読み込みに失敗しました</strong><br>
      <span style="font-size:12px;opacity:.7;display:block;margin-top:8px">
        WordPressの .htaccess にCORSヘッダーを追加してください。<br>
        下部の「CORS設定」セクションを参照。
      </span>
      <span style="font-size:10px;opacity:.4;display:block;margin-top:10px">${msg}</span>
    </div>
  `;
}
</script>
